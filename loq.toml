# loq configuration - file size enforcement
# Run `loq baseline` to update when files exceed limits

default_max_lines = 750
respect_gitignore = true

exclude = ["**/uv.lock", ".git/**", ".claude/**", "docs/**", "**/*.lock", "**/package-lock.json", "renderer/src/playground/examples.json", "src/prefab_ui/renderer/app.html", "src/prefab_ui/renderer/generative.html"]

[[rules]]
path = "**/*.css"
max_lines = 1500

[[rules]]
path = "renderer/src/style.css"
max_lines = 1630

[[rules]]
path = "renderer/src/demo-data.ts"
max_lines = 1096
